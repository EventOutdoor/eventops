<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EventOps — Ma mission</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #F8F9FA;
    --surface: #FFFFFF;
    --border: #E5E7EB;
    --primary: #F97316;
    --primary-dark: #EA6B0E;
    --green: #16A34A;
    --green-bg: #DCFCE7;
    --red: #DC2626;
    --red-bg: #FEE2E2;
    --text: #111827;
    --muted: #6B7280;
    --font-head: 'Syne', sans-serif;
    --font-body: 'DM Sans', sans-serif;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: var(--font-body); min-height: 100vh; }

  .hero {
    background: linear-gradient(135deg, #0D1117 0%, #1B2433 100%);
    color: white; padding: 32px 20px 48px;
  }
  .hero-logo { font-family: var(--font-head); font-size: 16px; font-weight: 800; color: var(--primary); margin-bottom: 24px; opacity: .9; }
  .hero-event { font-size: 13px; color: rgba(255,255,255,0.5); text-transform: uppercase; letter-spacing: .1em; margin-bottom: 8px; }
  .hero-title { font-family: var(--font-head); font-size: 28px; font-weight: 800; line-height: 1.2; }
  .hero-date { margin-top: 10px; font-size: 14px; color: rgba(255,255,255,0.6); }

  .container { max-width: 520px; margin: -24px auto 0; padding: 0 16px 40px; }

  .card {
    background: var(--surface); border: 1px solid var(--border); border-radius: 16px;
    padding: 24px; margin-bottom: 16px; box-shadow: 0 2px 16px rgba(0,0,0,0.06);
  }
  .card-head { display: flex; align-items: center; gap: 12px; margin-bottom: 16px; }
  .card-icon { width: 40px; height: 40px; border-radius: 10px; background: #FEF3E2; display: flex; align-items: center; justify-content: center; font-size: 20px; flex-shrink: 0; }
  .card-label { font-size: 11px; text-transform: uppercase; letter-spacing: .08em; color: var(--muted); margin-bottom: 2px; }
  .card-value { font-family: var(--font-head); font-size: 18px; font-weight: 700; }

  .detail-row { display: flex; gap: 12px; align-items: flex-start; padding: 10px 0; border-bottom: 1px solid var(--border); }
  .detail-row:last-child { border-bottom: none; }
  .detail-key { font-size: 12px; color: var(--muted); width: 90px; flex-shrink: 0; padding-top: 1px; }
  .detail-val { font-size: 14px; flex: 1; }

  .material-badge {
    display: inline-block; background: #FEF3E2; color: #9A3412; border: 1px solid #FED7AA;
    border-radius: 6px; padding: 4px 10px; font-size: 13px; margin: 3px;
  }

  .actions { margin-top: 8px; }
  .action-title { font-family: var(--font-head); font-size: 18px; font-weight: 700; margin-bottom: 6px; }
  .action-sub { font-size: 14px; color: var(--muted); margin-bottom: 20px; }

  .btn {
    width: 100%; padding: 16px; border: none; border-radius: 12px; font-family: var(--font-body);
    font-size: 16px; font-weight: 500; cursor: pointer; transition: all .2s; margin-bottom: 10px;
    display: flex; align-items: center; justify-content: center; gap: 10px;
  }
  .btn-confirm { background: var(--green); color: white; }
  .btn-confirm:hover { background: #15803D; transform: translateY(-1px); }
  .btn-decline { background: white; color: var(--red); border: 2px solid #FECACA; }
  .btn-decline:hover { background: var(--red-bg); }
  .btn:disabled { opacity: .5; cursor: not-allowed; transform: none !important; }

  .result-card {
    text-align: center; padding: 40px 24px; border-radius: 16px;
  }
  .result-confirmed { background: var(--green-bg); border: 2px solid #86EFAC; }
  .result-declined { background: var(--red-bg); border: 2px solid #FCA5A5; }
  .result-icon { font-size: 56px; margin-bottom: 12px; }
  .result-title { font-family: var(--font-head); font-size: 22px; font-weight: 800; margin-bottom: 8px; }
  .result-sub { font-size: 15px; color: var(--muted); }

  .loading { text-align: center; padding: 80px 20px; color: var(--muted); }
  .spinner { width: 36px; height: 36px; border: 3px solid #E5E7EB; border-top-color: var(--primary); border-radius: 50%; animation: spin .8s linear infinite; margin: 0 auto 16px; }
  @keyframes spin { to { transform: rotate(360deg); } }

  .error-card { text-align: center; padding: 60px 24px; }
  .error-icon { font-size: 48px; margin-bottom: 16px; }
  .error-title { font-family: var(--font-head); font-size: 22px; font-weight: 700; color: var(--red); margin-bottom: 8px; }

  .already-responded { background: #F0F9FF; border: 1px solid #BAE6FD; border-radius: 12px; padding: 16px; margin-bottom: 16px; font-size: 14px; color: #0369A1; }
</style>
</head>
<body>

<div id="loading" class="loading">
  <div class="spinner"></div>
  <div>Chargement de votre mission...</div>
</div>

<div id="content" style="display:none">
  <div class="hero">
    <div class="hero-logo">⚡ EventOps Outdoor</div>
    <div class="hero-event" id="hero-event"></div>
    <div class="hero-title" id="hero-title"></div>
    <div class="hero-date" id="hero-date"></div>
  </div>

  <div class="container">
    <div class="card">
      <div class="card-head">
        <div class="card-icon">📍</div>
        <div>
          <div class="card-label">Votre poste</div>
          <div class="card-value" id="pos-name"></div>
        </div>
      </div>
      <div id="pos-details"></div>
    </div>

    <div class="card" id="material-card" style="display:none">
      <div style="font-size: 13px; font-weight: 600; text-transform: uppercase; letter-spacing: .06em; color: var(--muted); margin-bottom: 12px;">🎒 Matériel à prévoir</div>
      <div id="material-list"></div>
    </div>

    <div class="card actions" id="action-card">
      <div class="action-title">Confirmez votre présence</div>
      <div class="action-sub">Votre réponse aide l'organisateur à finaliser l'événement.</div>
      <div id="action-area"></div>
    </div>
  </div>
</div>

<div id="error" style="display:none">
  <div class="container" style="padding-top:40px;">
    <div class="card error-card">
      <div class="error-icon">❌</div>
      <div class="error-title">Lien invalide</div>
      <div style="font-size:14px; color:var(--muted);">Ce lien n'existe pas ou a expiré. Contactez l'organisateur de l'événement.</div>
    </div>
  </div>
</div>

<script>
const SUPABASE_URL = localStorage.getItem('sb_url') || '';
const SUPABASE_KEY = localStorage.getItem('sb_key') || '';

const params = new URLSearchParams(window.location.search);
const token = params.get('token');

async function sbGet(table, query = '') {
  const r = await fetch(`${SUPABASE_URL}/rest/v1/${table}?${query}`, {
    headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}` }
  });
  return r.json();
}
async function sbPost(table, data) {
  const r = await fetch(`${SUPABASE_URL}/rest/v1/${table}`, {
    method: 'POST',
    headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}`, 'Content-Type': 'application/json', 'Prefer': 'return=representation' },
    body: JSON.stringify(data)
  });
  return r.json();
}
async function sbPatch(table, query, data) {
  const r = await fetch(`${SUPABASE_URL}/rest/v1/${table}?${query}`, {
    method: 'PATCH',
    headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}`, 'Content-Type': 'application/json', 'Prefer': 'return=representation' },
    body: JSON.stringify(data)
  });
  return r.json();
}

function esc(str) {
  if (!str) return '';
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

async function init() {
  if (!token) { showError(); return; }
  if (!SUPABASE_URL || !SUPABASE_KEY) {
    document.getElementById('loading').innerHTML = `
      <div style="max-width:400px; margin:0 auto; padding:20px;">
        <div style="background:white; border-radius:16px; padding:32px; text-align:center; box-shadow:0 4px 20px rgba(0,0,0,0.1);">
          <div style="font-size:40px; margin-bottom:16px;">⚙️</div>
          <div style="font-size:18px; font-weight:700; margin-bottom:8px;">Configuration requise</div>
          <div style="font-size:14px; color:#6B7280; margin-bottom:20px;">Entrez vos identifiants Supabase pour afficher cette page bénévole.</div>
          <input id="cfg-url" type="url" placeholder="https://xxx.supabase.co" style="width:100%; padding:10px; margin-bottom:10px; border:1px solid #E5E7EB; border-radius:8px; font-size:14px;">
          <input id="cfg-key" type="text" placeholder="anon key..." style="width:100%; padding:10px; margin-bottom:16px; border:1px solid #E5E7EB; border-radius:8px; font-size:14px; word-break:break-all;">
          <button onclick="saveCfg()" style="width:100%; padding:12px; background:#F97316; color:white; border:none; border-radius:8px; font-size:15px; cursor:pointer; font-weight:500;">Configurer</button>
        </div>
      </div>`;
    return;
  }
  try {
    const tokenRows = await sbGet('invite_tokens', `token=eq.${token}`);
    if (!tokenRows.length) { showError(); return; }
    const tokenRow = tokenRows[0];

    const [assignments, confirmations] = await Promise.all([
      sbGet('assignments', `id=eq.${tokenRow.assignment_id}`),
      sbGet('confirmations', `token=eq.${token}`)
    ]);

    if (!assignments.length) { showError(); return; }
    const asgn = assignments[0];

    const [events, volunteers, positions] = await Promise.all([
      sbGet('events', `id=eq.${tokenRow.event_id}`),
      sbGet('volunteers', `id=eq.${asgn.volunteer_id}`),
      sbGet('positions', `id=eq.${asgn.position_id}`)
    ]);

    const event = events[0];
    const volunteer = volunteers[0];
    const position = positions[0];
    const existing = confirmations[0];

    if (!event || !volunteer || !position) { showError(); return; }

    // Fill hero
    document.getElementById('hero-event').textContent = 'Événement';
    document.getElementById('hero-title').textContent = event.name;
    if (event.start_date) {
      const d = new Date(event.start_date).toLocaleDateString('fr-FR', { weekday:'long', day:'numeric', month:'long', year:'numeric' });
      document.getElementById('hero-date').textContent = `📅 ${d}${event.location ? ' · 📍 ' + event.location : ''}`;
    }

    // Fill position
    document.getElementById('pos-name').textContent = position.name;
    let details = '';
    if (position.type) details += `<div class="detail-row"><div class="detail-key">Type</div><div class="detail-val">${esc(position.type)}</div></div>`;
    if (position.description) details += `<div class="detail-row"><div class="detail-key">Instructions</div><div class="detail-val">${esc(position.description)}</div></div>`;
    if (event.location) details += `<div class="detail-row"><div class="detail-key">Lieu</div><div class="detail-val">${esc(event.location)}</div></div>`;
    document.getElementById('pos-details').innerHTML = details;

    // Material
    if (position.material) {
      const items = position.material.split(',').map(s => s.trim()).filter(Boolean);
      document.getElementById('material-list').innerHTML = items.map(i => `<span class="material-badge">🎒 ${esc(i)}</span>`).join('');
      document.getElementById('material-card').style.display = 'block';
    }

    // Actions
    const actionArea = document.getElementById('action-area');
    if (existing) {
      document.getElementById('action-card').innerHTML = existing.response === 'confirmed'
        ? `<div class="result-card result-confirmed"><div class="result-icon">✅</div><div class="result-title">Merci ${esc(volunteer.full_name.split(' ')[0])} !</div><div class="result-sub">Vous avez confirmé votre présence.<br>L'organisateur a été notifié.</div></div>`
        : `<div class="result-card result-declined"><div class="result-icon">💙</div><div class="result-title">Réponse enregistrée</div><div class="result-sub">Vous avez indiqué ne pas être disponible.<br>Merci pour votre retour.</div></div>`;
    } else {
      actionArea.innerHTML = `
        <button class="btn btn-confirm" onclick="respond('confirmed')">✅ Je confirme ma présence</button>
        <button class="btn btn-decline" onclick="respond('declined')">Je ne serai pas disponible</button>`;
    }

    document.getElementById('loading').style.display = 'none';
    document.getElementById('content').style.display = 'block';

    window._tokenId = token;
  } catch(e) {
    console.error(e);
    showError();
  }
}

async function respond(response) {
  const btns = document.querySelectorAll('.btn');
  btns.forEach(b => b.disabled = true);
  try {
    // Check if already exists
    const existing = await sbGet('confirmations', `token=eq.${window._tokenId}`);
    if (existing.length) {
      await sbPatch('confirmations', `token=eq.${window._tokenId}`, { response, responded_at: new Date().toISOString() });
    } else {
      await sbPost('confirmations', { token: window._tokenId, response, responded_at: new Date().toISOString() });
    }
    const card = document.getElementById('action-card');
    if (response === 'confirmed') {
      card.innerHTML = `<div class="result-card result-confirmed"><div class="result-icon">✅</div><div class="result-title">Parfait, à bientôt !</div><div class="result-sub">Votre présence est confirmée.<br>Rendez-vous le jour de l'événement.</div></div>`;
    } else {
      card.innerHTML = `<div class="result-card result-declined"><div class="result-icon">💙</div><div class="result-title">Réponse enregistrée</div><div class="result-sub">Merci pour votre retour.<br>L'organisateur a été notifié.</div></div>`;
    }
  } catch(e) {
    btns.forEach(b => b.disabled = false);
    alert('Erreur lors de l\'envoi. Réessayez.');
  }
}

function showError() {
  document.getElementById('loading').style.display = 'none';
  document.getElementById('error').style.display = 'block';
}

function saveCfg() {
  const url = document.getElementById('cfg-url').value.trim().replace(/\/$/, '');
  const key = document.getElementById('cfg-key').value.trim();
  if (!url || !key) return alert('Remplissez les deux champs');
  localStorage.setItem('sb_url', url);
  localStorage.setItem('sb_key', key);
  location.reload();
}

init();
</script>
</body>
</html>
